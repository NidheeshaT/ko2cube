# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions: Build & Validate Ko2cube OpenEnv
# Builds Docker image, starts container, tests all endpoints
# ─────────────────────────────────────────────────────────────────────────────
name: Validate OpenEnv

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.10
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install openenv-core uvicorn httpx

      # Step 4: Run environment unit tests (Grader, Rewards)
      - name: Run environment unit tests
        run: |
          python -c "
          from ko2cube.server.environment import Ko2cubeEnvironment
          from ko2cube.models import Ko2cubeAction, JobAssignment

          # 1. Test environment reset
          env = Ko2cubeEnvironment()
          obs = env.reset(task_id='easy')
          assert obs.current_step == 0
          assert len(obs.job_queue) > 0
          assert 0.01 <= obs.reward <= 0.99, f'Reset reward {obs.reward} out of range (0, 1)'

          # 2. Test environment step
          # Assign the first job in the queue
          job_id = obs.job_queue[0].job_id
          action = Ko2cubeAction(assignments=[
              JobAssignment(job_id=job_id, decision='schedule', region='us-east-1', instance_type='m5.large', machine_type='spot')
          ])
          new_obs = env.step(action)
          assert new_obs.current_step == 1
          assert 0.01 <= new_obs.reward <= 0.99, f'Step reward {new_obs.reward} out of range (0, 1)'

          # 3. Test grader score range
          score = env.grader_score()
          assert 0.01 <= score <= 0.99, f'Grader score {score} out of range (0, 1)'

          print('✅ All internal environment unit tests passed')
          "

      # Step 5: Build Docker image
      - name: Build Docker image
        run: docker build -t ko2cube-env .

      # Step 6: Start Docker container
      - name: Start container
        run: |
          docker run -d --name openenv-test -p 8000:8000 ko2cube-env
          echo "Waiting for container to start..."
          # Give it more time for the Gradio/FastAPI server to warm up
          for i in {1..10}; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Waiting..."
            sleep 2
          done

      # Step 7: Test GET /health returns HTTP 200
      - name: Test GET /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "GET /health returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Expected 200, got $STATUS"
            docker logs openenv-test
            exit 1
          fi
          echo "PASS: GET /health returns 200"

      # Step 8: Test POST /reset returns valid observation
      - name: Test POST /reset
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/reset \
            -H "Content-Type: application/json" \
            -d '{"task_id": "easy"}')
          echo "POST /reset returned: $RESPONSE" | head -c 500
          # Standard OpenEnv Core response has 'observation' field
          HAS_OBS=$(echo "$RESPONSE" | python -c "import sys,json; print('observation' in json.load(sys.stdin))")
          if [ "$HAS_OBS" != "True" ]; then
            echo "FAIL: Expected 'observation' in response"
            exit 1
          fi
          echo "PASS: POST /reset returns observation"

      # Step 9: Test GET /score (our manual endpoint)
      - name: Test GET /score
        run: |
          RESPONSE=$(curl -s http://localhost:8000/score)
          echo "GET /score returned: $RESPONSE"
          SCORE=$(echo "$RESPONSE" | python -c "import sys,json; print(json.load(sys.stdin)['score'])")
          # Check range
          if (( $(echo "$SCORE < 0.01 || $SCORE > 0.99" | bc -l) )); then
            echo "FAIL: /score is $SCORE, outside strictly required (0.01, 0.99) range"
            exit 1
          fi
          echo "PASS: /score is $SCORE"

      # Step 10: Run openenv validate (if possible in CI)
      - name: Run openenv validate
        run: |
          pip install openenv-core
          openenv validate

      # Step 11: Cleanup
      - name: Stop container
        if: always()
        run: |
          docker stop openenv-test || true
          docker rm openenv-test || true
